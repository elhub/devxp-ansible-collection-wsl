---
- name: Set docker user
  ansible.builtin.set_fact:
    docker_user: "{{ docker_user | default(ansible_user_id) }}"

- name: Install pre-requisites for installing Docker
  ansible.builtin.apt:
    name: "{{ packages }}"
    state: present
    update_cache: yes
  vars:
    packages:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
  become: true

- name: Get the system architecture of your computer and put it in a variable
  ansible.builtin.command: dpkg --print-architecture
  changed_when: false
  register: _docker_system_architecture

- name: Download docker key with proxy # noqa: command-instead-of-module
  ansible.builtin.shell:
    cmd: >
      curl --proxy {{ https_proxy }}
      https://download.docker.com/linux/ubuntu/gpg
      | sudo gpg --dearmor -o /usr/share/keyrings/docker.gpg
    creates: /usr/share/keyrings/docker.gpg
  become: true
  when: https_proxy is defined and https_proxy | length > 0

- name: Download docker key without proxy # noqa: command-instead-of-module
  ansible.builtin.shell:
    cmd: >
      curl https://download.docker.com/linux/ubuntu/gpg
      | sudo gpg --dearmor -o /usr/share/keyrings/docker.gpg
    creates: /usr/share/keyrings/docker.gpg
  become: true
  when: https_proxy is not defined or https_proxy | length == 0

- name: Add apt repository for Docker stable version
  ansible.builtin.shell:
    cmd: >
      echo "deb [arch={{ _docker_system_architecture.stdout }} signed-by=/usr/share/keyrings/docker.gpg]
      https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
      | tee /etc/apt/sources.list.d/docker.list
  become: true

- name: Install Docker and its dependencies
  ansible.builtin.apt:
    name: "{{ packages }}"
    state: present
    update_cache: yes
  vars:
    packages:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
  become: true

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ docker_user }}"
    groups: docker
    append: yes
  become: true

# dependencies for ansible docker_* modules
- name: Install docker python packages
  ansible.builtin.pip:
    name:
      - docker
      - docker-compose
    extra_args: --user
  environment:
    DISPLAY: ''  # Fix to resolve extremely slow installs on WSL2 (see https://github.com/microsoft/WSL/issues/6643)
  when: "{{ docker_ansible_dependencies_pip | bool }}"
